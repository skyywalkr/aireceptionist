; Sample `extensions.conf` dialplan
[general]
static=yes
writeprotect=no

[default]
; basic example - incoming calls go to an IVR or to the ARI app
exten => _X.,1,NoOp(Incoming call to ${EXTEN})
 same => n,Answer()
 ; Send channel to Stasis so ARI can handle it
 same => n,Stasis(ai_receptionist)
 same => n,Hangup()

[outbound]
; When originating outbound calls, you can use this context to place the call
; into Stasis by using the ARI originate or AMI originate and pointing the app.


; Sample `pjsip.conf` snippet for a SIP trunk provider
; Place user-specific credentials and realm per your provider's instructions.

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0

[trunk-provider]
type=registration
outbound_auth=trunk-provider
server_uri=sip:your-sip-provider.example
client_uri=sip:YOUR_USERNAME@your-sip-provider.example

[trunk-provider]
type=auth
auth_type=userpass
password=YOUR_TRUNK_PASSWORD
username=YOUR_TRUNK_USERNAME

[trunk-endpoint]
type=endpoint
transport=transport-udp
context=from-trunk
disallow=all
allow=ulaw,alaw
outbound_auth=trunk-provider

; This is intentionally a minimal example. Your provider may require more
; settings (DTMF, codecs, NAT, etc.).

## STEP 10: Troubleshooting

### ARI Connection Refused
```bash
# Check if ARI is listening
sudo netstat -tln | grep 8088

# Check if ari.conf is valid
sudo asterisk -C /etc/asterisk/asterisk.conf -nx "ari show status"

# Check auth
curl -v -u baduser:badpass http://127.0.0.1:8088/ari/asterisk/info
# Should return 401 Unauthorized
```

### PJSIP Trunk Not Registering
```bash
# Check registration status
sudo asterisk -rvvv
asterisk*CLI> pjsip show registrations

# Enable PJSIP debug
asterisk*CLI> pjsip set logger on
asterisk*CLI> tail -f /var/log/asterisk/pjsip.log

# Test trunk connectivity
asterisk*CLI> pjsip qualify endpoint trunk_endpoint
```

### Outbound Calls Failing
```bash
# Check if trunk is available
asterisk*CLI> pjsip show endpoints

# Check outbound proxy
asterisk*CLI> pjsip show aors

# Try a test call
asterisk*CLI> channel originate PJSIP/+15555551234@trunk extension 1234@from_trunk

# Watch full log
asterisk*CLI> tail -f /var/log/asterisk/full
```

### Stasis App Not Receiving Events
```bash
# Verify app is registered
asterisk*CLI> stasis show subscriptions

# Check app name matches config
# In ari.conf: [ai_receptionist]
# In app.py: ARI_APP_NAME = 'ai_receptionist'

# Enable Stasis debugging
asterisk*CLI> stasis set debug all
```


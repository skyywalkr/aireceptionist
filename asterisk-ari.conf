## STEP 5: Configure Logger (for debugging)

### File: /etc/asterisk/logger.conf

```ini
[general]
queue_log = yes
queue_log_name = QUEUE_LOG

[logfiles]
console = verbose,debug
messages = notice,warning,error
full = verbose,debug
queue_log = notice
ari = verbose,debug,notice,warning,error
stasis = verbose,debug,notice,warning,error
pjsip = verbose,debug,notice,warning,error
```


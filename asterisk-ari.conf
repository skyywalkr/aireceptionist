## STEP 3: Create Dialplan for AI Receptionist

### File: /etc/asterisk/extensions.conf

```ini
;
; Nexus AI Receptionist Dialplan
;

[ai_receptionist_app]
;
; This context is where the Stasis application puts incoming calls
; The application is controlled via ARI from the Flask app
;
exten => _.,1,NoOp(Call from ${CALLERID(num)})
exten => _.,n,Answer()
exten => _.,n,Stasis(ai_receptionist,${EXTEN})
exten => _.,n,Hangup()

[from_trunk]
;
; Incoming calls from your SIP trunk
;
exten => _.,1,NoOp(Incoming call to ${EXTEN} from ${CALLERID(num)})
exten => _.,n,Set(CHANNEL(language)=en)
exten => _.,n,Goto(ai_receptionist_app,${EXTEN},1)

[outbound_calls]
;
; Outbound calls via Stasis app (originated from ARI)
;
exten => _.,1,NoOp(Outbound call to ${EXTEN})
exten => _.,n,Set(CHANNEL(language)=en)
exten => _.,n,Stasis(ai_receptionist,${EXTEN})
exten => _.,n,Hangup()
```


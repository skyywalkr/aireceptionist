## Security Best Practices

1. **Change Default Credentials**
   - ARI password in `ari.conf`
   - SIP trunk credentials in `pjsip.conf`
   - Database password in Flask `.env`

2. **Firewall**
   - Bind ARI to 127.0.0.1 (proxy via NGINX)
   - Restrict SIP access to known providers
   - Use UFW rules (see firewall.sh)

3. **TLS for SIP**
   - Use TLS for trunk registration
   - Use TLS for ARI (if possible)
   - Keep certificates up to date

4. **Logging**
   - Monitor `/var/log/asterisk/full` for errors
   - Use structured logging
   - Rotate logs regularly

5. **Monitoring**
   - Track active channels
   - Monitor resource usage (CPU, memory, open files)
   - Set up alerts for failures


# Asterisk Configuration for Nexus AI Receptionist
# These files configure Asterisk to work with the AI receptionist via ARI

## STEP 1: Enable and Configure ARI (Asterisk REST Interface)

### File: /etc/asterisk/ari.conf

```ini
[general]
;
; Asterisk REST Interface (ARI) Configuration
;
; Enable the ARI (allows external applications to control Asterisk via REST API)
enabled = yes

; Bind to localhost only (proxied through NGINX in production)
bindaddr = 127.0.0.1
bindport = 8088

; Pretty-print JSON responses
pretty = yes

; Docs available at http://127.0.0.1:8088/ari/api-docs/
docs_enabled = yes

; CORS settings (for browser access via reverse proxy)
allow_origins = *
allow_methods = GET,PUT,POST,DELETE,OPTIONS

[asterisk]
;
; ARI user credentials
; Username: asterisk
; Password: Change this to a secure password!
;
type = user
read_only = no
password = your_secure_ari_password_here

[ai_receptionist]
;
; Application namespace for the Nexus AI Receptionist
;
type = application
```

### Restart Asterisk

```bash
sudo asterisk -rx "ari set debug all"  # Enable debug logging
sudo systemctl restart asterisk
sudo asterisk -rvvv  # Verify startup messages
```


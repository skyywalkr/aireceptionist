## STEP 9: Example: Originating Outbound Call

The Flask app makes calls like this:

```python
import ari

client = ari.connect('http://127.0.0.1:8088', 'asterisk', 'your_password')

# Originate call to +15555551234 via 'trunk' endpoint
channel = client.channels.create(
    endpoint='PJSIP/+15555551234@trunk',
    app='ai_receptionist',
    appArgs='test'
)

print(f"Channel created: {channel.id}")
```

Asterisk will:
1. Create a new channel
2. Place it into the `ai_receptionist` Stasis app
3. The Flask app receives the `StasisStart` event
4. Flask can then play audio, record, hang up, etc.


## STEP 4: Configure Modules

### File: /etc/asterisk/modules.conf

Ensure these modules are loaded:

```ini
[modules]
; Core modules (required)
autoload = yes

; Explicitly load ARI-related modules
load = res_ari.so
load = res_ari_channels.so
load = res_ari_playback.so
load = res_ari_recordings.so
load = res_ari_model.so
load = res_ari_events.so
load = app_stasis.so

; PJSIP modules
load = res_pjsip.so
load = res_pjsip_session.so
load = res_pjsip_registrar.so
load = res_pjsip_publish_asterisk.so
load = res_pjsip_outbound_registration.so
load = res_pjsip_endpoint_identifier_by_username.so
load = res_pjsip_endpoint_identifier_by_ip.so
load = res_pjsip_nat.so
load = res_pjsip_notify.so
load = res_pjsip_logger.so

; Codecs
load = codec_gsm.so
load = codec_ulaw.so

; Recording and playback
load = app_voicemail.so
load = app_queue.so
load = app_voicemail_main.so
```


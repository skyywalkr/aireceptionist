## STEP 2: Configure PJSIP Trunk (for outbound calls)

### File: /etc/asterisk/pjsip.conf

Add this configuration for your SIP trunk provider:

```ini
[trunk](!)
type = registration
transport = transport_tls
outbound_proxy = sip.provider.com:5061
expiration = 3600

[trunk_auth](!)
type = auth
auth_type = userpass
username = your_account_id
password = your_sip_password

[trunk_aor](!)
type = aor
contact = sip:your_account_id@sip.provider.com

[trunk_endpoint](!)
type = endpoint
outbound_auth = trunk_auth
aors = trunk_aor
context = from-trunk
allow = !all,ulaw,gsm
dtmf_mode = rfc4733
;
; For your specific SIP provider, adjust based on their documentation
;

; Example: Twilio BYOC (Bring Your Own Carrier)
[twilio](trunk)
transport = transport_tls
outbound_proxy = yourbyocterminal.sip.twilio.com:5061

[twilio_auth](trunk_auth)
username = your_account_sid
password = your_auth_token

[twilio_aor](trunk_aor)
contact = sip:your_account_sid@yourbyocterminal.sip.twilio.com

[twilio](trunk_endpoint)
outbound_auth = twilio_auth
aors = twilio_aor
from_user = your_account_sid
from_domain = yourbyocterminal.sip.twilio.com
send_pai = yes
send_diversion = yes

; Example: Generic SIP Provider
[generic_provider](trunk)
transport = transport_udp
outbound_proxy = sip.provider.com:5060

[generic_provider_auth](trunk_auth)
username = username
password = password

[generic_provider_aor](trunk_aor)
contact = sip:username@sip.provider.com

[generic_provider](trunk_endpoint)
outbound_auth = generic_provider_auth
aors = generic_provider_aor
```

### Configure TLS Transport (if using secure SIP)

```ini
[transport_tls]
type = transport
protocol = tls
bind = 0.0.0.0:5061
ca_list_file = /etc/asterisk/keys/ca.crt
cert_file = /etc/asterisk/keys/asterisk.crt
priv_key_file = /etc/asterisk/keys/asterisk.key
; Optional: Require TLS
require_client_cert = no
verify_server = yes
```


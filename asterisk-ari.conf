sudo asterisk -rvvv

# General info
asterisk*CLI> core show version
asterisk*CLI> core show calls
asterisk*CLI> core show channels

# ARI specific
asterisk*CLI> ari show status
asterisk*CLI> ari show events

# PJSIP specific
asterisk*CLI> pjsip show endpoints
asterisk*CLI> pjsip show aors
asterisk*CLI> pjsip show registrations
asterisk*CLI> pjsip show channels

# Debug
asterisk*CLI> ari set debug all
asterisk*CLI> stasis set debug all
asterisk*CLI> pjsip set logger on

# Reload configs (without restarting)
asterisk*CLI> reload
asterisk*CLI> dialplan reload
asterisk*CLI> module reload res_pjsip.so

# Restart
asterisk*CLI> restart now

# Exit
asterisk*CLI> quit
```

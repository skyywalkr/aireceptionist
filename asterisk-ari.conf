## Performance Tuning

### /etc/asterisk/asterisk.conf

```ini
[options]
; Increase open files limit
maxfiles = 65536

; Thread pool settings
astmm_error_file = /var/log/asterisk/memory_error_log
astmm_log_file = /var/log/asterisk/memory_log

[default]
; Channel thread pool
; More threads = better concurrency, more CPU
; Adjust based on your hardware
high_priority_thread_count = 8
```

### /etc/asterisk/res_pjsip.conf

```ini
[global]
; Connection pooling for better performance
type = global
max_forwards = 70
user_agent = Nexus/1.0
default_realm = yourdomain.com
```


# NGINX Reverse Proxy Configuration for Nexus AI Receptionist
# File: /etc/nginx/sites-available/nexus
# Enable with: sudo ln -sf /etc/nginx/sites-available/nexus /etc/nginx/sites-enabled/nexus

# HTTP redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;
    
    # Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS Configuration
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;
    
    # SSL Certificate (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    
    # SSL Configuration (modern, secure)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # HSTS header (after testing, use includeSubDomains with caution)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # CSP header (adjust as needed)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self';" always;
    
    # Logging
    access_log /var/log/nginx/nexus_access.log combined buffer=32k flush=5s;
    error_log /var/log/nginx/nexus_error.log warn;
    
    # Proxy settings
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    
    # Upstream Flask application
    upstream nexus_app {
        server 127.0.0.1:5000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    # Serve static files directly (if applicable)
    location /static/ {
        alias /opt/nexus/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # Health check endpoint (if implemented)
    location /health {
        access_log off;
        proxy_pass http://nexus_app;
        proxy_http_version 1.1;
    }
    
    # API endpoints with strict rate limiting
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
        
        proxy_pass http://nexus_app;
        proxy_http_version 1.1;
        
        # WebSocket support (if needed for live updates)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Request headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Buffering for large requests
        client_max_body_size 10M;
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }
    
    # Auth endpoints with strict rate limiting
    location /auth/ {
        limit_req zone=auth burst=10 nodelay;
        limit_req_status 429;
        
        proxy_pass http://nexus_app;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        client_max_body_size 1M;
    }
    
    # Call endpoint with moderate rate limiting
    location /call {
        limit_req zone=calls burst=5 nodelay;
        limit_req_status 429;
        
        # Only allow POST
        if ($request_method !~ ^(POST)$) {
            return 405;
        }
        
        proxy_pass http://nexus_app;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Higher timeout for call processing
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        
        client_max_body_size 50M;
    }
    
    # Main application proxy
    location / {
        limit_req zone=general burst=30 nodelay;
        
        proxy_pass http://nexus_app;
        proxy_http_version 1.1;
        
        # Connection headers
        proxy_set_header Connection "upgrade";
        proxy_set_header Upgrade $http_upgrade;
        
        # Host and forwarding headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Session and cookie handling
        proxy_cookie_path / "/";
        proxy_cookie_flags ~ secure httponly;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }
    
    # Deny access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# Rate limiting zones (defined outside server block)
# Add these at the top of /etc/nginx/nginx.conf in the http block:
#
# # General rate limiting: 10 req/sec per IP
# limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
#
# # API rate limiting: 5 req/sec per IP
# limit_req_zone $binary_remote_addr zone=api:10m rate=5r/s;
#
# # Auth rate limiting: 2 req/sec per IP (strict)
# limit_req_zone $binary_remote_addr zone=auth:10m rate=2r/s;
#
# # Call rate limiting: 1 req/sec per IP
# limit_req_zone $binary_remote_addr zone=calls:10m rate=1r/s;
